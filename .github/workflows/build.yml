name: Build

on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build FamilBudget.exe
        run: |
          pyinstaller --noconfirm --onefile --windowed --name FamilBudget budget.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: FamilBudget-Windows
          path: dist/FamilBudget.exe
