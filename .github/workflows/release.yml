name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Read app version
        id: app_version
        shell: bash
        run: |
          VERSION=$(python -c "from version import APP_VERSION; print(APP_VERSION)")
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build FamilBudget.exe
        run: |
          pyinstaller --noconfirm --onefile --windowed --name FamilBudget budget.py

      - name: Create GitHub Release and upload exe
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            FamilBudget release

            - Tag: ${{ github.ref_name }}
            - Version (version.py): ${{ steps.app_version.outputs.value }}
          files: |
            dist/FamilBudget.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
